<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build WebApp - Strona główna</title>
    <style>
        :root {
            --bg: #f4efe7;
            --panel: #fffaf3;
            --line: #d8cab5;
            --text: #26221d;
            --muted: #6f685c;
            --accent: #254f42;
            --accent-soft: #d9ece5;
            --nav-bg: rgba(255, 250, 243, 0.94);
            --available: #1f6a43;
            --available-bg: #dff3e7;
            --prep: #8b5a16;
            --prep-bg: #f8e9cc;
            --expansion: #5d3a8a;
            --expansion-bg: #ece4fb;
            --requires: #7b2631;
            --requires-bg: #f7dbe0;
            --seasonal: #155d75;
            --seasonal-bg: #dceff6;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(37, 79, 66, 0.12), transparent 28%),
                linear-gradient(180deg, #fbf8f4 0%, var(--bg) 100%);
        }
        .layout { max-width: 1260px; margin: 0 auto; padding: 20px 16px 48px; }
        .app-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--nav-bg);
            box-shadow: 0 10px 20px rgba(38, 34, 29, 0.05);
        }
        .app-nav-title { font-weight: 800; }
        .app-nav-links { display: flex; flex-wrap: wrap; gap: 10px; }
        .app-nav-link {
            padding: 10px 14px;
            border-radius: 999px;
            text-decoration: none;
            color: var(--text);
            background: #fff;
            border: 1px solid rgba(38, 34, 29, 0.08);
            font-weight: 700;
        }
        .app-nav-link-active { background: linear-gradient(135deg, #234739 0%, #3a6f5d 100%); color: #f5fbf8; }
        .hero, .module-group {
            margin-bottom: 18px;
            padding: 20px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 250, 243, 0.96);
            box-shadow: 0 12px 24px rgba(38, 34, 29, 0.05);
        }
        .eyebrow {
            display: inline-block;
            margin-bottom: 10px;
            padding: 6px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        h1, h2, h3 { margin-top: 0; }
        p { line-height: 1.6; }
        .hero p, .group-heading p { color: var(--muted); max-width: 920px; }
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
        }
        .module-card {
            padding: 16px;
            border: 1px solid rgba(38, 34, 29, 0.08);
            border-radius: 16px;
            background: #fff;
        }
        .module-card-top { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin-bottom: 12px; }
        .module-meta { color: var(--muted); font-size: 0.9rem; }
        .module-description { margin-bottom: 10px; }
        .module-hint { color: var(--muted); font-size: 0.95rem; min-height: 58px; }
        .module-link {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 999px;
            text-decoration: none;
            background: linear-gradient(135deg, #234739 0%, #3a6f5d 100%);
            color: #f5fbf8;
            font-weight: 700;
        }
        .module-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 800;
        }
        .status-available { color: var(--available); background: var(--available-bg); }
        .status-in-preparation { color: var(--prep); background: var(--prep-bg); }
        .status-after-expansion { color: var(--expansion); background: var(--expansion-bg); }
        .status-requires-expansion { color: var(--requires); background: var(--requires-bg); }
        .status-seasonal { color: var(--seasonal); background: var(--seasonal-bg); }
        {{APP_SHELL_STYLES}}
    </style>
</head>
<body>
<main class="layout">
    {{GLOBAL_NAV}}

    <section class="hero">
        <div class="eyebrow">App Shell / Hub SSR</div>
        <h1>Strona główna aplikacji</h1>
        <p>{{INTRO_TEXT}}</p>
    </section>

    {{MODULE_GROUPS}}
</main>
</body>
</html>
